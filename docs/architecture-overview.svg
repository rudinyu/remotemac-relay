<svg width="680" viewBox="0 0 680 486" role="img" xmlns="http://www.w3.org/2000/svg">
<title>remotemac-relay overall architecture</title>
<desc>Mesh VPN (coordinator control plane + mesh.py nodes with UDP P2P data plane and DERP fallback, layering TUN overlay, subnet routing, exit node and split-DNS) plus the original remote desktop / proxy (relay.py blind pipe pairing remote_desktop.py host and viewer over a SecureChannel).</desc>
<style>
.t{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-weight:500;font-size:14px;fill:#181818}
.ts{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-weight:400;font-size:12px;fill:#6b6b6b}
.blue{fill:#e8eef9;stroke:#c2d1ea}
.amber{fill:#f7ecd9;stroke:#e6d3ad}
.neutral{fill:#f5f5f4;stroke:#d6d3d1}
.ln{stroke:#9a9a9a}
.div{stroke:#e0e0e0}
</style>
<rect x="0" y="0" width="680" height="486" fill="#ffffff"/>
<defs>
<marker id="arw" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#9a9a9a"/></marker>
<marker id="arwS" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto"><path d="M8,0 L0,4 L8,8 Z" fill="#9a9a9a"/></marker>
</defs>

<text class="ts" x="40" y="30">mesh vpn — self-hosted, Tailscale-lite</text>

<rect class="blue" x="220" y="48" width="240" height="48" rx="8"/>
<text class="t" x="340" y="70" text-anchor="middle">coordinator.py</text>
<text class="ts" x="340" y="86" text-anchor="middle">control plane · overlay IPs · STUN</text>

<line class="ln" x1="140" y1="150" x2="262" y2="98" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arw)"/>
<line class="ln" x1="540" y1="150" x2="418" y2="98" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arw)"/>
<text class="ts" x="340" y="122" text-anchor="middle">control channel · token auth + PoP</text>

<rect class="blue" x="50" y="150" width="180" height="52" rx="8"/>
<text class="t" x="140" y="174" text-anchor="middle">mesh.py — node A</text>
<text class="ts" x="140" y="192" text-anchor="middle">X25519 identity</text>
<rect class="blue" x="450" y="150" width="180" height="52" rx="8"/>
<text class="t" x="540" y="174" text-anchor="middle">mesh.py — node B</text>
<text class="ts" x="540" y="192" text-anchor="middle">X25519 identity</text>

<line class="ln" x1="232" y1="176" x2="448" y2="176" stroke-width="1.6" marker-end="url(#arw)" marker-start="url(#arwS)"/>
<text class="ts" x="340" y="170" text-anchor="middle">direct: UDP P2P · NAT hole-punch</text>
<text class="ts" x="340" y="196" text-anchor="middle">else DERP relay via coordinator (ciphertext)</text>

<text class="ts" x="40" y="234">node data plane (root) — layered on each node · X25519 → ChaCha20-Poly1305</text>
<rect class="neutral" x="50" y="246" width="128" height="46" rx="8"/>
<text class="t" x="114" y="268" text-anchor="middle">TUN overlay</text>
<text class="ts" x="114" y="284" text-anchor="middle">tun.py</text>
<rect class="neutral" x="202" y="246" width="128" height="46" rx="8"/>
<text class="t" x="266" y="268" text-anchor="middle">subnet routing</text>
<text class="ts" x="266" y="284" text-anchor="middle">nat.py</text>
<rect class="neutral" x="354" y="246" width="128" height="46" rx="8"/>
<text class="t" x="418" y="268" text-anchor="middle">exit node</text>
<text class="ts" x="418" y="284" text-anchor="middle">netroute.py</text>
<rect class="neutral" x="506" y="246" width="128" height="46" rx="8"/>
<text class="t" x="570" y="268" text-anchor="middle">split-DNS</text>
<text class="ts" x="570" y="284" text-anchor="middle">meshdns.py</text>

<line class="div" x1="40" y1="318" x2="640" y2="318" stroke-width="1"/>
<text class="ts" x="40" y="342">remote desktop / proxy — original, independent</text>

<rect class="amber" x="50" y="356" width="178" height="52" rx="8"/>
<text class="t" x="139" y="380" text-anchor="middle">remote_desktop.py</text>
<text class="ts" x="139" y="398" text-anchor="middle">host · screen + input</text>
<rect class="amber" x="251" y="356" width="178" height="52" rx="8"/>
<text class="t" x="340" y="380" text-anchor="middle">relay.py</text>
<text class="ts" x="340" y="398" text-anchor="middle">blind pipe · pairs by id</text>
<rect class="amber" x="452" y="356" width="178" height="52" rx="8"/>
<text class="t" x="541" y="380" text-anchor="middle">remote_desktop.py</text>
<text class="ts" x="541" y="398" text-anchor="middle">viewer · controls host</text>
<line class="ln" x1="228" y1="382" x2="249" y2="382" stroke-width="1.4" marker-end="url(#arw)"/>
<line class="ln" x1="452" y1="382" x2="431" y2="382" stroke-width="1.4" marker-end="url(#arw)"/>

<text class="ts" x="340" y="428" text-anchor="middle">outbound TCP → bridged, end-to-end encrypted</text>
<text class="ts" x="340" y="444" text-anchor="middle">SecureChannel: scrypt · SHAKE-256 · HMAC-SHA256</text>
<text class="ts" x="40" y="474">blue = mesh vpn · amber = remote desktop / proxy · dashed = control &amp; fallback</text>
</svg>
